baseURL = baseURL = 'https://pung09er.github.io/cpf-radian-ag/'
locale = 'en-us'
title = 'Robert Walters | CPF Agrosphere'
theme = 'paige'
paginate = 10

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params.paige]
style = """
#paige-site-description {
    margin-top: 1rem;
}
#paige-site-title {
    font-size: 3rem;
}
#paige-page-title {
    margin-bottom: .5rem;
}
#paige-page-content {
    margin-top: 0;
}
#paige-page-content img {
    margin-top: 1.2rem;
     margin-bottom: 1rem;
}    
"""

[params.paige.site]
description = "Agronomics | Environment | Systems | Infrastructure"

