    name = 'Portal'
    identifier = 'portal'
    weight = 10

  [[menu.main]]
    name = 'Projects'
    identifier = 'projects'
    parent = 'portal'
    url = '/projects/'
    weight = 1

  [[menu.main]]
    name = "Dirt Hog's Companion"
    parent = 'portal'
    url = '/dirt-hogs-companion/'
    weight = 2

  [[menu.main]]
    name = 'Advancing Agronomy Notes'
